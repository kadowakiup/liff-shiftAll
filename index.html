<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>シフト一括入力</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="index.js"></script>
</head>
<body>
  <div id="result"></div>
  
  <div id="month-selector" style="display: none;">
    <p>入力する月を選択してください</p>
    <!-- CSSでまとめてデザインできるように class="month-btn" を追加 -->
    <button id="btn-current-month" class="month-btn"></button>
    <button id="btn-next-month" class="month-btn"></button>
  </div>

  <div class="title-container">
    <button id="back-btn" style="display: none;">
      <img src="images/left_arrow.png" alt="戻る">
    </button>
    <h1 id="page-title" class="title" style="display: none;"></h1>
  </div>

  <p id="notice-text" style="display: none;">※14:00~15:00、16:50~17:00、18:50~19:00は休憩となります</p>
  
  <div id="shift-list"></div>
  
  <div class="button-container">
    <button id="submit-btn" style="display: none;">提出</button>
  </div>
</body>
</html>
